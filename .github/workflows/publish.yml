name: Publish

on:
  # Manual run (decoupled from a release).
  workflow_dispatch:
  # Called by release.yml after a v* tag's GitHub Release succeeds, so a tag both
  # creates the release and publishes to crates.io.
  workflow_call:
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # No pre-publish `cargo test` here: on the tag path release.yml's `test` job has
      # already built+tested this exact commit (release is gated on it), and each
      # `cargo publish` below runs `--verify` (builds the crate from its packaged
      # tarball — the check that catches packaging bugs). For a manual dispatch, run CI
      # first; `--verify` still gates build-correctness.

      - name: Publish to crates.io
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Workspace target version: $VERSION"

          # Publish order: dependencies before dependents. os-truststore has no internal
          # deps today; new os-tools crates are inserted here in dependency order.
          CRATES=(
            os-truststore   # Layer 0: no internal deps
          )

          # ── Phase 1: Inventory ─────────────────────────────────
          echo "═══ Inventory ═══"
          NEW_CRATES=()
          UPDATE_CRATES=()
          for crate in "${CRATES[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "User-Agent: os-tools-ci (https://github.com/sylin-org/os-tools)" \
              "https://crates.io/api/v1/crates/${crate}" || echo "404")
            if [ "$status" = "200" ]; then
              UPDATE_CRATES+=("$crate")
            else
              NEW_CRATES+=("$crate")
            fi
          done
          echo "Updates (burst 30): ${UPDATE_CRATES[*]:-none}"
          echo "New     (burst 5):  ${NEW_CRATES[*]:-none}"
          echo ""

          NEW_TOTAL=${#NEW_CRATES[@]}
          if [ "$NEW_TOTAL" -gt 0 ]; then
            BATCHES=$(( (NEW_TOTAL + 4) / 5 ))
            WAIT_MIN=$(( (BATCHES - 1) * 10 ))
            echo "⚠️  ${NEW_TOTAL} new crate(s) → ${BATCHES} batch(es), ~${WAIT_MIN} min of rate-limit waits"
          else
            echo "✅ All crates are updates - no rate-limit waits needed"
          fi
          echo ""

          # ── Phase 2: Publish ───────────────────────────────────
          echo "═══ Publishing ═══"
          NEW_COUNT=0
          NEW_BURST=5

          for crate in "${CRATES[@]}"; do
            IS_UPDATE=false
            for u in "${UPDATE_CRATES[@]:-}"; do
              if [ "$u" = "$crate" ]; then IS_UPDATE=true; break; fi
            done

            if [ "$IS_UPDATE" = true ]; then
              echo "📦 ${crate}: update"
            else
              NEW_COUNT=$((NEW_COUNT + 1))
              echo "🆕 ${crate}: new (${NEW_COUNT}/${NEW_BURST} tokens)"
              if [ "$NEW_COUNT" -ge "$NEW_BURST" ]; then
                echo "⏳ New-crate bucket exhausted. Waiting 10 min for refill..."
                sleep 600
                NEW_COUNT=0
              fi
            fi

            cargo publish -p "$crate" --locked 2>&1 | tee /tmp/publish_output.txt || {
              exit_code=${PIPESTATUS[0]}
              if grep -q "already exists" /tmp/publish_output.txt; then
                echo "⏭️  ${crate}: version already published, skipping verification"
                continue
              else
                echo "❌ ${crate}: publish failed"
                cat /tmp/publish_output.txt
                exit "$exit_code"
              fi
            }
            echo "✅ ${crate} publish command succeeded"

            echo "🔎 Verifying ${crate} version on crates.io..."
            VERIFIED=false
            for i in {1..12}; do
              MAX_VER=$(curl -s -H "User-Agent: os-tools-ci (https://github.com/sylin-org/os-tools)" "https://crates.io/api/v1/crates/${crate}" | jq -r '.crate.max_version // empty' || echo "")
              if [ "$MAX_VER" = "$VERSION" ]; then
                echo "✅ Verified: ${crate} is active at version ${VERSION} on crates.io"
                VERIFIED=true
                break
              fi
              echo "⏳ Index not propagated yet (current: '${MAX_VER}', expected: '${VERSION}'). Retrying in 10s (${i}/12)..."
              sleep 10
            done

            if [ "$VERIFIED" = "false" ]; then
              echo "❌ Failed to verify ${crate} ${VERSION} on crates.io after 2 minutes"
              exit 1
            fi
            sleep 8
          done

          echo ""
          echo "═══ All ${#CRATES[@]} crate(s) published and verified ═══"
